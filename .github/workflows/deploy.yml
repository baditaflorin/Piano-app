name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:  # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        run: |
          npx esbuild src/app.ts \
            --bundle \
            --format=esm \
            --outfile=dist/app.js \
            --platform=browser \
            --target=es2020 \
            --minify

      - name: Assemble site
        run: |
          mkdir -p _site
          cp piano.html _site/index.html
          cp piano.css  _site/piano.css
          cp -r dist    _site/dist
          cp -r songs   _site/songs
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
